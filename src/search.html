<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>search</title>
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0&icon_names=search" />
</head>
<body>
    <header class="top-nav">
        <div class="nav-left">
            <button class="icon-btn">&#9776;</button> 
            <a class="home-btn" href="index.html"><img id="logo" src="../images/personal-pantheon-logo.png" alt=""></a> 
        </div>
    </header>

    <main>
        <h1>General Search:</h1>
        <form class="general-form">
            <select id="search-options">
                <option>All</option>
                <option>Character</option>
                <option>Comic</option>
            </select>
            <input type="text" placeholder="Search for a character and comic" id="general-search">
            <button type="submit" id="general-search-btn"> 
                <span class="material-symbols-outlined" id="search-icon">search</span>
            </button>
        </form>
        <h1 id="results-title">Results:</h1>
        <div class="results-container">
            <span class="result-card">
                <a href="character.html">
                    <img src="images/search-character-1.jpg">
                    <h2>Mephitso (Character)</h2>
                </a>
            </span>
            <span class="result-card">
                <a href="character.html">
                    <img src="images/search-character-2.jpg">
                    <h2>Mephitso (Character)</h2>
                </a>
                
            </span>
            <span class="result-card">
                <a href="comic.html">
                    <img src="images/search-comic-1.jpg">
                    <h2>Hellverine #5 - The Mephisto Conspiracy (Comic)</h2>
                </a>
            </span>
            <span class="result-card">
                <a href="comic.html">
                    <img src="images/search-comic-2.jpg">
                    <h2>Mephitso: Speak of the Devil (Comic)</h2>
                </a>
            </span>
        </div>
    </main>
    <footer class="site-footer">
        <div class="footer-left">
            <div class="footer-icon-placeholder">&#127924;</div> 
        </div>
        <div class="footer-right">
            <p>contact us</p>
            <p>emalexample@emailexample.com</p>
        </div>
    </footer>
</body>
</html>
