<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search page for characters and comics">
    <title>search</title>
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0&icon_names=search" />
    <script defer type="module" src="js/search.js"></script>
</head>
<body>
    <header class="top-nav">
        <div class="nav-left">
            <button class="icon-btn">&#9776;</button> 
            <a class="home-btn" href="index.html" aria-label="Go back to the home page">
                <img id="logo" src="images/personal-pantheon-logo.png" alt="Image of The Personal Pantheon Logo" width="90" height="90">
            </a> 
        </div>
    </header>

    <main>
        <h1>General Search:</h1>
        <form class="general-form">
            <select id="search-options">
                <option>All</option>
                <option>Character</option>
                <option>Comic</option>
            </select>
            <input type="search" placeholder="Search for a character and comic" id="general-search" required>
            <button type="submit" id="general-search-btn"> 
                <span class="material-symbols-outlined" id="search-icon">search</span>
            </button>
        </form>
        <h1 id="results-title">Results:</h1>
        <div class="results-container"></div>
    </main>
    <footer class="site-footer">
        <div class="footer-left">
            <img src="images/personal_pantheon_logo_transparent.png" alt="Image of transparent logo">
        </div>
        <div class="footer-right">
            <p>contact us</p>
            <p>emalexample@emailexample.com</p>
        </div>
    </footer>
</body>
</html>
