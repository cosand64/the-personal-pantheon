<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Home page with featured comic and carousels for comic and characters">
    <title>Comic Book Database - Home</title>
    <script type='module' src="js/main.js" defer></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0&icon_names=search" />
</head>
<body>

    <header class="top-nav">
        <div class="nav-left">
            <button class="icon-btn">&#9776;</button> 
            <a class="home-btn" href="index.html" aria-label="Go back to the home page">
                <img id="logo" src="images/personal-pantheon-logo.png" alt="Image of The Personal Pantheon Logo">
            </a> 
        </div>
        
        <div class="nav-right">
            <div class="search-container">
                <form class="general-form" action="search.html">
                    <input type="text" placeholder="Search... " id="general-search">
                    <button type="submit" id="general-search-btn" class="icon-btn"> 
                        <span class="material-symbols-outlined" id="search-icon">search</span>
                    </button>
                </form>
                <a class="icon-btn user-btn" href="favorites.html">&#128100;</a> 
            </div>
        </div>
    </header>

    <main>
        <div>
            <section class="featured-section"></section>
            <section class="gallery-section">
                <h2>Comics</h2>
                <div class="carousel-container">
                    <button class="carousel-arrow">&#10094;</button> 
                        <div class="carousel-image-wrapper" id="comic"></div>
                    <button class="carousel-arrow">&#10095;</button> 
                </div>
            </section>
            <section class="gallery-section">
                <h2>Characters</h2>
                <div class="carousel-container">
                    <button class="carousel-arrow">&#10094;</button> 
                        <div class="carousel-image-wrapper" id="character"></div>
                    <button class="carousel-arrow">&#10095;</button> 
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-left">
            <img src="images/personal_pantheon_logo_transparent.png" alt="Image of transparent logo">
        </div>
        <div class="footer-right">
            <p>contact us</p>
            <p>emalexample@emailexample.com</p>
        </div>
    </footer>

</body>
</html>
