<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic</title>
    <link rel="stylesheet" href="css/comic.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0&icon_names=search" />
    <script defer src="js/character-comic.js"></script>
    <script defer type="module" src="js/comic.js"></script>
</head>
<body>
    <header class="top-nav">
        <div class="nav-left">
            <button class="icon-btn">&#9776;</button> 
            <a class="home-btn" href="index.html"><img id="logo" src="images/personal-pantheon-logo.png" alt=""></a> 
        </div>
        
        <div class="nav-right">
            <div class="search-container">
                <form class="general-form" action="search.html">
                    <input type="text" placeholder="Search... " id="general-search">
                    <button type="submit" id="general-search-btn" class="icon-btn"> 
                        <span class="material-symbols-outlined" id="search-icon">search</span>
                    </button>
                </form>
                <a class="icon-btn user-btn" href="favorites.html">&#128100;</a> 
            </div>
        </div>
    </header>

    <main>
        <div class="comic-container">
            <div class="general-info">
                <img src="">
                <section class="issue-details">
                    <h2>Issue Details</h2>
                    <div id="name"></div>
                    <div id="volume"></div>
                    <div id="issue-number"></div>
                </section>   
            </div>
            <div class="comic-info">
                <button class="fav-btn">Favorite</button>
                <div class="saved">Comic saved!</div>
                <h2>Description</h2>
                <section class="description"></section>
                <section class="characters">
                    <h2>Characters</h2>
                    <div class="character-container"></div>
                </section>
                <section class="creators">
                    <h2>Creators</h2>
                    <div class="creator-container"></div>
                </section>
            </div>
        </div>
    </main>
    <footer class="site-footer">
        <div class="footer-left">
            <div class="footer-icon-placeholder">&#127924;</div> 
        </div>
        <div class="footer-right">
            <p>contact us</p>
            <p>emalexample@emailexample.com</p>
        </div>
    </footer>
</body>
</html>
