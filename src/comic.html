<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Information about a specific comic issue">
    <title>Comic</title>
    <script defer type="module" src="js/comic.js"></script>
</head>
<body>
    <header class="top-nav">
        <div class="nav-left">
            <button class="icon-btn" id="menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">&#9776;</button> 
            <a class="home-btn" href="index.html" aria-label="Go back to the home page">
                <img id="logo" src="images/personal-pantheon-logo.png" alt="Image of The Personal Pantheon Logo" width="90" height="90">
            </a>
            <nav id="mobile-menu" class="mobile-menu" aria-hidden="true">
                <a href="index.html">Home</a>
                <a href="search.html">Search</a>
                <a href="favorites.html">Favorites</a>
                <a href="contact-us.html">Contact Us</a>
            </nav> 
        </div>
        
        <div class="nav-right">
            <div class="search-container">
                <form class="general-form" action="search.html">
                    <label for="general-search" class="visually-hidden">Search</label>
                    <input type="text" placeholder="Search... " id="general-search">
                    <button type="submit" id="general-search-btn" class="icon-btn" aria-label="Search">🔍</button>
                </form>
                <a class="icon-btn user-btn" href="favorites.html" aria-label="Go to favorites">&#128100;</a> 
            </div>
        </div>
    </header>

    <main>
        <div class="page-loader" id="page-loader" aria-hidden="true">
        <div class="spinner"></div>
        </div>
        <div id="search-modal" class="modal" role="dialog" aria-labelledby="modal-title" aria-modal="true" aria-hidden="true">
            <section class="modal-content">
                <span class="close-button" aria-label="Close modal">&times;</span>
                <h2 id="modal-title">Please enter at least 1 character!</h2>
            </section>
        </div>
        <div class="comic-container">
            <div class="general-info"></div>
            <div class="comic-info">
                <div class="favorite-group">
                    <button class="fav-btn">Favorite</button>
                    <div class="saved">Comic saved!</div>
                </div>
                <h2>Description</h2>
                <section class="description"></section>
                <section class="characters">
                    <h2>Characters</h2>
                    <div class="character-container"></div>
                </section>
                <section class="creators">
                    <h2>Creators</h2>
                    <div class="creator-container"></div>
                </section>
            </div>
        </div>
    </main>
    <footer class="site-footer">
        <div class="footer-left">
            <img src="images/personal_pantheon_logo_transparent.png" alt="Image of transparent logo" width="92" height="90">
        </div>
        <div class="footer-right">
            <a href="contact-us.html">Contact Us</a>
            <p>emalexample@emailexample.com</p>
        </div>
    </footer>
</body>
</html>
