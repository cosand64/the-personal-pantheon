<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>search</title>
    <link rel="stylesheet" href="../css/search.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0&icon_names=search" />

</head>
<body>
    <header></header>
    <main>
        <h1>General Search:</h1>
        <form class="general-form">
            <input type="text" placeholder="Search for a character and comic" id="general-search">
            <button type="submit" id="general-search-btn"> 
                <span class="material-symbols-outlined" id="search-icon">search</span>
            </button>
            
        </form>
        <h1>Search for a specifc character or comic:</h1>
        <div class="specific-search-container">
            <details name="specific-search">
                <summary>Search by Character</summary>
                <form class="character-form">
                    <label for="charactername">Character name:</label>
                    <input type="text" id="character-name" name="charactername">
                    <label for="createdyear">Year created (optional):</label>
                    <input type="text" id="created-year" name="createdyear">
                    <input type="submit" value="Search">
                </form>
            </details>
            <details name="specific-search">
                <summary>Search by Comic</summary>
                <form class="comic-form">
                    <label for="comicname">Comic name:</label>
                    <input type="text" id="comic-name" name="comicname">
                    <label for="createdyear">Year created (optional):</label>
                    <input type="text" id="created-year" name="createdyear">
                    <input type="submit" value="Search">
                </form>
            </details>
        </div>
        <div class="results"></div>
    </main>
    <footer></footer>
</body>
</html>
