<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>search</title>
    <link rel="stylesheet" href="../css/search.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0&icon_names=search" />

</head>
<body>
    <header></header>
    <main>
        <h1>General Search:</h1>
        <form class="general-form">
            <input type="text" placeholder="Search for a character and comic" id="general-search">
            <button type="submit" id="general-search-btn"> 
                <span class="material-symbols-outlined" id="search-icon">search</span>
            </button>
        </form>
        <h1>Search for a specifc character or comic:</h1>
        <div class="specific-search-container">
            <details name="specific-search">
                <summary>Search by Character</summary>
                <form class="character-form">
                    <label for="charactername">Character name:</label>
                    <input type="text" id="character-name" name="charactername" placeholder="Character Name">
                    <label for="createdyear">Year created (optional):</label>
                    <input type="text" id="created-year" name="createdyear" placeholder="Year Created">
                    <button type="submit">Search</button>
                </form>
            </details>
            <details name="specific-search">
                <summary>Search by Comic</summary>
                <form class="comic-form">
                    <label for="comicname">Comic name:</label>
                    <input type="text" id="comic-name" name="comicname" placeholder="Comic Name">
                    <label for="createdyear">Year created (optional):</label>
                    <input type="text" id="created-year" name="createdyear" placeholder="Year Created">
                    <button type="submit">Search</button>
                </form>
            </details>
        </div>
        <h1>Results:</h1>
        <div class="results-container">
            <span class="result-card">
                <a href="character.html">
                    <img src="../images/search-character-1.jpg">
                    <h2>Mephitso (Character)</h2>
                </a>
            </span>
            <span class="result-card">
                <a href="character.html">
                    <img src="../images/search-character-2.jpg">
                    <h2>Mephitso (Character)</h2>
                </a>
                
            </span>
            <span class="result-card">
                <a href="comic.html">
                    <img src="../images/search-comic-1.jpg">
                    <h2>Hellverine #5 - The Mephisto Conspiracy (Comic)</h2>
                </a>
            </span>
            <span class="result-card">
                <a href="comic.html">
                    <img src="../images/search-comic-2.jpg">
                    <h2>Mephitso: Speak of the Devil (Comic)</h2>
                </a>
            </span>
        </div>
    </main>
    <footer></footer>
</body>
</html>
