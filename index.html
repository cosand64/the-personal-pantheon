<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Book Database - Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0&icon_names=search" />
    <script type="module" src="js/home.js"></script>
</head>
<body>

    <header class="top-nav">
        <div class="nav-left">
            <button class="icon-btn">&#9776;</button> 
            <button class="icon-btn home-btn"><img id="logo" src="../images/personal-pantheon-logo.png" alt=""></button> 
        </div>
        
        <div class="nav-right">
            <div class="search-container">
                <form class="general-form" action="search.html">
                    <input type="text" placeholder="Search... " id="general-search">
                    <button type="submit" id="general-search-btn" class="icon-btn"> 
                        <span class="material-symbols-outlined" id="search-icon">search</span>
                    </button>
                </form>
                <button class="icon-btn user-btn">&#128100;</button> 
            </div>
        </div>
    </header>

    <main>
        
        <section class="featured-section">
            <img src="../images/character-1.jpg" alt="Featured Character">
        </section>

        <section class="gallery-section">
            <h2>Comics</h2>
            <div class="carousel-container">
                <button class="carousel-arrow">&#10094;</button> 
                    <div class="carousel-image-wrapper">
                        <img src="your-comic-image.jpg" alt="Comic Book Cover">
                    </div>
                
                <button class="carousel-arrow">&#10095;</button> 
            </div>
        </section>

        <section class="gallery-section">
            <h2>Characters</h2>
            <div class="carousel-container">
                <button class="carousel-arrow">&#10094;</button> 
                    <div class="carousel-image-wrapper">
                        <img src="your-comic-image.jpg" alt="Comic Book Cover">
                    </div>
                
                <button class="carousel-arrow">&#10095;</button> 
            </div>
        </section>

    </main>

    <footer class="site-footer">
        <div class="footer-left">
            <div class="footer-icon-placeholder">&#127924;</div> 
        </div>
        <div class="footer-right">
            <p>contact us</p>
            <p>emalexample@emailexample.com</p>
        </div>
    </footer>

</body>
</html>
